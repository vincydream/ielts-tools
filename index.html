<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS Sprint</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <div class="top">
    <div class="brand">IELTS <span>Sprint</span></div>
    <div class="stats">
      <div class="stat">🔥 <span class="stat-value" id="stat-streak">0</span></div>
      <div class="stat">⚡ <span class="stat-value" id="stat-xp">0</span></div>
      <div class="stat">📚 <span class="stat-value" id="stat-mastered">0</span></div>
    </div>
  </div>

  <div class="progress"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>

  <div class="nav">
    <button data-view="today" class="active">Today</button>
    <button data-view="review">Review <span class="badge" id="review-count" style="display:none">0</span></button>
    <button data-view="library">Library</button>
    <button data-view="progress">Progress</button>
  </div>

  <main id="view"></main>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
