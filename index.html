<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS Sprint · 雅思冲刺</title>
<style>
:root {
  --bg: #0e1013;
  --surface: #171a1f;
  --surface-2: #1f232a;
  --surface-3: #272c35;
  --border: #2c313b;
  --text: #e8eaed;
  --text-dim: #8b909a;
  --text-dimmer: #5c626d;
  --accent: #7c9cff;
  --accent-hover: #93aeff;
  --accent-glow: rgba(124, 156, 255, 0.18);
  --success: #4ade80;
  --success-glow: rgba(74, 222, 128, 0.15);
  --danger: #f87171;
  --danger-glow: rgba(248, 113, 113, 0.15);
  --warning: #fbbf24;
  --radius: 12px;
  --radius-lg: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.app {
  max-width: 780px;
  margin: 0 auto;
  padding: 24px 20px 80px;
}

/* --- HEADER --- */
.top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}
.brand {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.brand span { color: var(--accent); }
.stats {
  display: flex;
  gap: 18px;
  font-size: 13px;
  color: var(--text-dim);
}
.stat {
  display: flex;
  align-items: center;
  gap: 6px;
}
.stat-value {
  color: var(--text);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.stat-value.pulse {
  animation: pulse-num 0.5s ease;
}
@keyframes pulse-num {
  0% { transform: scale(1); color: var(--text); }
  40% { transform: scale(1.2); color: var(--accent); }
  100% { transform: scale(1); color: var(--text); }
}

/* --- NAV --- */
.nav {
  display: flex;
  gap: 4px;
  margin-bottom: 24px;
  background: var(--surface);
  padding: 4px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
}
.nav button {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text-dim);
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
}
.nav button:hover { color: var(--text); }
.nav button.active {
  background: var(--surface-3);
  color: var(--text);
}
.nav button .badge {
  display: inline-block;
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 8px;
  margin-left: 4px;
  font-weight: 600;
}

/* --- CARD --- */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  margin-bottom: 16px;
}
.card-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}
.card-heading {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 4px;
  letter-spacing: -0.01em;
}
.card-sub {
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 20px;
}

/* --- TECHNIQUE LESSON --- */
.lesson-body {
  font-size: 15px;
  color: #d1d5db;
}
.lesson-body p { margin-bottom: 12px; }
.lesson-body strong { color: var(--text); }
.lesson-body .rule {
  background: var(--surface-2);
  border-left: 3px solid var(--accent);
  padding: 12px 16px;
  border-radius: 6px;
  margin: 14px 0;
}
.lesson-body .rule-label {
  font-size: 11px;
  color: var(--accent);
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.lesson-body em {
  color: var(--warning);
  font-style: normal;
  font-weight: 500;
}

.begin-btn {
  display: block;
  width: 100%;
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 14px;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  margin-top: 8px;
  transition: all 0.15s;
}
.begin-btn:hover { background: var(--accent-hover); }
.begin-btn:disabled { background: var(--surface-3); color: var(--text-dim); cursor: default; }

/* --- QUESTION --- */
.q-context {
  background: var(--surface-2);
  padding: 16px;
  border-radius: var(--radius);
  font-size: 14px;
  color: #d1d5db;
  line-height: 1.75;
  margin-bottom: 16px;
  border: 1px solid var(--border);
}
.q-context .highlight {
  background: var(--accent-glow);
  padding: 1px 3px;
  border-radius: 3px;
  color: var(--accent);
  font-weight: 500;
}
.q-prompt {
  font-size: 15px;
  font-weight: 500;
  margin-bottom: 14px;
  padding: 0 4px;
}
.q-options {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.q-opt {
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 14px;
  font-family: inherit;
  text-align: left;
  cursor: pointer;
  transition: all 0.15s;
}
.q-opt:hover:not(:disabled) {
  border-color: var(--accent);
  background: var(--surface-3);
}
.q-opt:disabled { cursor: default; }
.q-opt.correct {
  background: var(--success-glow);
  border-color: var(--success);
  color: var(--success);
  animation: correct-flash 0.4s ease;
}
.q-opt.wrong {
  background: var(--danger-glow);
  border-color: var(--danger);
  color: var(--danger);
}
@keyframes correct-flash {
  0% { transform: scale(1); }
  50% { transform: scale(1.02); }
  100% { transform: scale(1); }
}

/* --- FEEDBACK --- */
.feedback {
  margin-top: 16px;
  padding: 14px 16px;
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 1.7;
  animation: slide-in 0.25s ease;
}
@keyframes slide-in {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.feedback.correct {
  background: var(--success-glow);
  border: 1px solid rgba(74, 222, 128, 0.3);
}
.feedback.wrong {
  background: var(--danger-glow);
  border: 1px solid rgba(248, 113, 113, 0.3);
}
.feedback-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.feedback.correct .feedback-label { color: var(--success); }
.feedback.wrong .feedback-label { color: var(--danger); }
.feedback .insight {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed rgba(255,255,255,0.08);
  color: var(--text-dim);
  font-size: 13px;
}
.feedback .insight-tag {
  color: var(--accent);
  font-weight: 600;
}

/* --- VOCAB CARD --- */
.vocab-word {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 4px;
}
.vocab-pos {
  color: var(--text-dim);
  font-size: 13px;
  font-style: italic;
  margin-bottom: 16px;
}
.vocab-scene {
  background: var(--surface-2);
  padding: 16px;
  border-radius: var(--radius);
  margin-bottom: 16px;
  font-size: 14px;
  color: #d1d5db;
  border-left: 3px solid var(--warning);
}
.vocab-scene .scene-label {
  font-size: 11px;
  color: var(--warning);
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.vocab-def {
  font-size: 15px;
  margin-bottom: 8px;
}
.vocab-def strong { color: var(--accent); }
.vocab-example {
  font-size: 14px;
  color: var(--text-dim);
  font-style: italic;
  padding: 10px 14px;
  background: var(--surface-2);
  border-radius: 8px;
  margin-bottom: 16px;
}

/* --- RATING --- */
.rating {
  display: flex;
  gap: 8px;
  margin-top: 16px;
}
.rating button {
  flex: 1;
  padding: 12px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.rating button:hover { background: var(--surface-3); }
.rating .r-forgot:hover { border-color: var(--danger); color: var(--danger); }
.rating .r-hard:hover { border-color: var(--warning); color: var(--warning); }
.rating .r-good:hover { border-color: var(--success); color: var(--success); }
.rating .interval {
  display: block;
  font-size: 10px;
  color: var(--text-dimmer);
  margin-top: 3px;
  font-weight: 400;
}

/* --- PROGRESS BAR --- */
.progress {
  height: 6px;
  background: var(--surface-2);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 20px;
}
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #a5c1ff);
  border-radius: 3px;
  transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
}

/* --- EMPTY / DONE --- */
.empty {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-dim);
}
.empty-icon {
  font-size: 42px;
  margin-bottom: 12px;
}
.empty-title {
  font-size: 18px;
  color: var(--text);
  font-weight: 600;
  margin-bottom: 6px;
}
.empty-sub { font-size: 14px; }

/* --- STREAK CALENDAR --- */
.calendar {
  display: grid;
  grid-template-columns: repeat(14, 1fr);
  gap: 4px;
  margin-top: 12px;
}
.day {
  aspect-ratio: 1;
  border-radius: 3px;
  background: var(--surface-2);
}
.day.done { background: var(--accent); }
.day.today { border: 1px solid var(--accent); }

/* --- MASTERY LIST --- */
.mastery-item {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.mastery-item:last-child { border: none; }
.mastery-item .m-word { font-weight: 500; }
.mastery-level {
  color: var(--text-dim);
  font-size: 12px;
  font-variant-numeric: tabular-nums;
}
.mastery-level .stars { color: var(--warning); letter-spacing: 2px; }

/* --- FLOATING XP --- */
.xp-float {
  position: fixed;
  top: 60px;
  right: 30px;
  color: var(--success);
  font-size: 18px;
  font-weight: 700;
  pointer-events: none;
  animation: xp-rise 1.2s ease-out forwards;
  z-index: 100;
}
@keyframes xp-rise {
  0% { opacity: 0; transform: translateY(10px); }
  20% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-40px); }
}

/* --- INSIGHT UNLOCK MODAL --- */
.modal-back {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  animation: fade-in 0.2s;
}
@keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 28px;
  max-width: 420px;
  margin: 20px;
  text-align: center;
  animation: scale-in 0.25s ease;
}
@keyframes scale-in {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.modal-icon { font-size: 40px; margin-bottom: 8px; }
.modal-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.modal-body { color: var(--text-dim); font-size: 14px; margin-bottom: 20px; }
.modal button {
  background: var(--accent); color: #fff; border: none;
  padding: 10px 24px; border-radius: 8px;
  font-family: inherit; font-size: 14px; font-weight: 500;
  cursor: pointer;
}

@media (max-width: 500px) {
  .stats { gap: 12px; font-size: 12px; }
  .app { padding: 16px 14px 60px; }
  .card { padding: 18px; }
  .vocab-word { font-size: 26px; }
}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="brand">IELTS <span>Sprint</span></div>
    <div class="stats">
      <div class="stat">🔥 <span class="stat-value" id="stat-streak">0</span></div>
      <div class="stat">⚡ <span class="stat-value" id="stat-xp">0</span></div>
      <div class="stat">📚 <span class="stat-value" id="stat-mastered">0</span></div>
    </div>
  </div>

  <div class="progress"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>

  <div class="nav">
    <button data-view="today" class="active">今日新学</button>
    <button data-view="review">复习 <span class="badge" id="review-count" style="display:none">0</span></button>
    <button data-view="library">技巧库</button>
    <button data-view="progress">进度</button>
  </div>

  <main id="view"></main>
</div>

<script>
/* =============================================================
   CONTENT — 内容库。加课就在这里加。
   ============================================================= */
const CONTENT = {
  lessons: [
    {
      id: 'reading-tfng',
      section: '阅读',
      title: 'True / False / Not Given 判断三分法',
      subtitle: '雅思阅读最易失分题型，掌握"绝对化陷阱"和"未提及 vs 矛盾"的差别',
      body: `
        <p>TFNG 题的本质不是"文章说没说"，而是<strong>"给出的陈述与原文的逻辑关系"</strong>。三种关系必须分清：</p>
        <div class="rule">
          <div class="rule-label">TRUE</div>
          原文有信息，且陈述是原文的<strong>同义改写</strong>。注意——是"改写"，不是原词照搬。原词照搬反而经常是陷阱。
        </div>
        <div class="rule">
          <div class="rule-label">FALSE</div>
          原文有信息，但陈述与原文<strong>直接矛盾</strong>。必须能在原文中找到明确的对立事实。
        </div>
        <div class="rule">
          <div class="rule-label">NOT GIVEN</div>
          原文<strong>没有提及</strong>该信息，或只提到一半。"文章没说"就是 NOT GIVEN，不要脑补。
        </div>
        <p><em>最常见陷阱</em>：陈述里出现 <strong>always / never / only / all / must / most</strong> 这类绝对化词汇。原文如果只是"often / usually / many"，这就不是 TRUE 而是 FALSE 或 NG——因为陈述夸大了。</p>
        <p><em>第二陷阱</em>：不要用常识推理。"作者提到 A 更好" 不代表 "B 更差"，除非原文明说。</p>
      `,
      questions: [
        {
          context: '<span class="highlight">Recent studies suggest that some species of octopus display problem-solving abilities</span> comparable to those of certain mammals, particularly in tasks involving spatial memory.',
          prompt: '判断：All octopus species have problem-solving abilities equal to mammals.',
          options: ['True', 'False', 'Not Given'],
          answer: 1,
          insight: '陈述用了 <span class="insight-tag">All</span> 和 <span class="insight-tag">equal</span>，但原文是 <span class="insight-tag">some species</span> 和 <span class="insight-tag">comparable</span>。范围被放大 + 程度被绝对化 = 与原文矛盾，是 FALSE，不是 NG。'
        },
        {
          context: '<span class="highlight">The city\'s public transport network expanded rapidly between 2010 and 2015</span>, though the pace of new construction has since slowed considerably.',
          prompt: '判断：Public transport construction in the city stopped after 2015.',
          options: ['True', 'False', 'Not Given'],
          answer: 1,
          insight: '"slowed considerably" 是"放缓"，不是"停止"。<span class="insight-tag">stopped</span> 是极端化改写，与原文矛盾，选 FALSE。区分"减慢"和"停止"是常见考点。'
        },
        {
          context: '<span class="highlight">Dr. Chen\'s research on urban wildlife has been widely cited</span> in policy discussions about green space allocation.',
          prompt: '判断：Dr. Chen\'s research is the most influential work in the field.',
          options: ['True', 'False', 'Not Given'],
          answer: 2,
          insight: '"widely cited" 只说被广泛引用，<span class="insight-tag">most influential</span> 是最高级排序——原文没有做过这个比较，是 NG 而不是 TRUE。别脑补。'
        },
        {
          context: '<span class="highlight">Although initial trials showed promising results, subsequent large-scale studies failed to replicate the effect</span>, leading many researchers to question the original findings.',
          prompt: '判断：The initial results of the trials could not be reproduced in later studies.',
          options: ['True', 'False', 'Not Given'],
          answer: 0,
          insight: '"failed to replicate" = "could not be reproduced"，标准同义改写。这就是 TRUE 的样子——不是词汇重合度高，而是<span class="insight-tag">逻辑等价</span>。'
        },
        {
          context: '<span class="highlight">The museum introduced free entry on weekends in 2019</span>, resulting in a noticeable increase in family visitors.',
          prompt: '判断：Weekend visitor numbers doubled after 2019.',
          options: ['True', 'False', 'Not Given'],
          answer: 2,
          insight: '原文只说 <span class="insight-tag">noticeable increase</span>（明显增加），没有说"翻倍"。<span class="insight-tag">具体数字</span>没有给就是 NG。任何时候出现具体数字/比例，先在原文找有没有对应数字。'
        }
      ]
    },
    {
      id: 'reading-matching-headings',
      section: '阅读',
      title: 'Matching Headings 段落主旨定位',
      subtitle: '不要从头读到尾。用"主题句-支撑句"结构 30 秒锁定每段核心',
      body: `
        <p>Matching Headings 最大的浪费是把每段读完再选。正确做法：<strong>先读所有 heading，标出关键词组，再回到文章"扫描主题句"</strong>。</p>
        <div class="rule">
          <div class="rule-label">STEP 1</div>
          先把 heading 全部读完，圈出每个 heading 的<strong>核心名词/动词</strong>（不是介词、定冠词）。相似的 heading 特别标记（那是陷阱源）。
        </div>
        <div class="rule">
          <div class="rule-label">STEP 2</div>
          每段只读<strong>第一句和最后一句</strong>。80% 情况下主旨在这两句。中间是例证/数据，先跳过。
        </div>
        <div class="rule">
          <div class="rule-label">STEP 3</div>
          如果首尾句抓不出主旨，找该段<strong>反复出现的名词</strong>——它就是这段的话题。
        </div>
        <p><em>核心陷阱</em>：段落里出现某个 heading 的关键词 ≠ 这个 heading 是答案。可能只是<strong>细节提及</strong>而非段落主旨。判断标准：这个 heading 能不能<strong>概括整段</strong>，而不仅仅是某一句。</p>
        <p><em>时间控制</em>：一段 30–45 秒。超过 1 分钟没定位就跳过，最后回来看剩下的 headings。</p>
      `,
      questions: [
        {
          context: '<span class="highlight">The invention of the printing press in the 15th century did not immediately transform European society.</span> For decades, printed books remained expensive luxuries accessible only to the wealthy. It was not until the late 16th century, when production costs fell dramatically, that literacy began to spread among the middle classes, gradually reshaping education, commerce, and religious practice.',
          prompt: '为这一段选择最合适的 heading：',
          options: [
            'The technological breakthrough of the printing press',
            'A delayed but transformative impact',
            'The cost of early printed books',
            'How printing changed religion'
          ],
          answer: 1,
          insight: '首句抓的是<span class="insight-tag">"did not immediately transform"</span>——延迟；末句抓<span class="insight-tag">"gradually reshaping"</span>——最终带来变革。合起来就是"延迟但深远的影响"。选项 C 和 D 是段中细节，不是主旨。'
        },
        {
          context: '<span class="highlight">Coral reefs face threats from multiple directions</span>. Rising sea temperatures cause bleaching. Ocean acidification weakens reef structures. Coastal development introduces sediment and pollutants. Overfishing removes species that keep algae in check. No single factor can be blamed—<span class="highlight">reefs are declining because of the combined pressure of many stressors</span>.',
          prompt: '为这一段选择最合适的 heading：',
          options: [
            'The impact of rising temperatures',
            'Why overfishing damages reefs',
            'The compound nature of reef decline',
            'Coral bleaching explained'
          ],
          answer: 2,
          insight: '首末句都在讲<span class="insight-tag">"multiple"</span> 和 <span class="insight-tag">"combined pressure"</span>——核心是"多重因素叠加"。A、B、D 都是段落里的具体例子，只覆盖一个方面，不能概括整段。这就是 Matching Headings 的经典陷阱：<span class="insight-tag">细节 ≠ 主旨</span>。'
        },
        {

/* =============================================================
   STATE
   ============================================================= */
const STORAGE_KEY = 'ielts-sprint-v1';
const DAY_MS = 86400000;
const XP_PER_ITEM = 10;

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function daysBetween(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const now = new Date(todayStr() + 'T00:00:00');
  return Math.round((now - d) / DAY_MS);
}

let state = null;
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {
    xp: 0,
    streak: 0,
    lastActive: null,
    completedLessons: [],
    items: {},        // itemId -> { level: 0-5, nextDue: 'YYYY-MM-DD', lastSeen }
    todayLessonId: null,
    todayItemsDone: 0,
    todayGoal: 5,
    history: {}       // date -> { xpGained, itemsDone }
  };
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

/* Streak logic */
function updateStreak() {
  const today = todayStr();
  if (state.lastActive === today) return;
  if (state.lastActive) {
    const gap = daysBetween(state.lastActive);
    if (gap === 1) state.streak += 1;
    else if (gap > 1) state.streak = 1;
  } else {
    state.streak = 1;
  }
  state.lastActive = today;
  saveState();
}

/* SRS intervals in days */
const SRS_INTERVALS = [1, 2, 4, 8, 16, 32];
function scheduleItem(itemId, rating) {
  // rating: 0 = forgot, 1 = hard, 2 = good
  const now = state.items[itemId] || { level: 0, lastSeen: null };
  if (rating === 0) now.level = 0;
  else if (rating === 1) now.level = Math.max(0, now.level);
  else now.level = Math.min(SRS_INTERVALS.length - 1, now.level + 1);
  const interval = SRS_INTERVALS[now.level];
  const due = new Date();
  due.setDate(due.getDate() + interval);
  now.nextDue = due.toISOString().slice(0,10);
  now.lastSeen = todayStr();
  state.items[itemId] = now;
}
function getDueItems() {
  const today = todayStr();
  return Object.entries(state.items)
    .filter(([id, data]) => data.nextDue <= today)
    .map(([id]) => id);
}

/* =============================================================
   VIEW STATE
   ============================================================= */
let currentView = 'today';
let sessionState = { mode: null, index: 0, list: [] };

/* =============================================================
   RENDER
   ============================================================= */
const $view = document.getElementById('view');
const $streak = document.getElementById('stat-streak');
const $xp = document.getElementById('stat-xp');
const $mastered = document.getElementById('stat-mastered');
const $progress = document.getElementById('progress-bar');
const $reviewCount = document.getElementById('review-count');

function updateStats(pulse) {
  $streak.textContent = state.streak;
  $xp.textContent = state.xp;
  const mastered = Object.values(state.items).filter(i => i.level >= 3).length;
  $mastered.textContent = mastered;
  if (pulse) {
    $xp.classList.add('pulse');
    setTimeout(() => $xp.classList.remove('pulse'), 500);
  }
  const dueCount = getDueItems().length;
  if (dueCount > 0) {
    $reviewCount.style.display = 'inline-block';
    $reviewCount.textContent = dueCount;
  } else {
    $reviewCount.style.display = 'none';
  }
  const todayProgress = Math.min(100, (state.todayItemsDone / state.todayGoal) * 100);
  $progress.style.width = todayProgress + '%';
}

function floatXP(amount) {
  const el = document.createElement('div');
  el.className = 'xp-float';
  el.textContent = '+' + amount + ' XP';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1300);
}

function gainXP(amount) {
  state.xp += amount;
  state.todayItemsDone += 1;
  const t = todayStr();
  if (!state.history[t]) state.history[t] = { xpGained: 0, itemsDone: 0 };
  state.history[t].xpGained += amount;
  state.history[t].itemsDone += 1;
  saveState();
  floatXP(amount);
  updateStats(true);
}

/* --- VIEW: TODAY --- */
function pickTodayLesson() {
  const today = todayStr();
  // If already set today, reuse
  if (state.todayLessonId && state.history[today]) return state.todayLessonId;
  // Pick next unlearned lesson
  const next = CONTENT.lessons.find(l => !state.completedLessons.includes(l.id));
  if (next) {
    state.todayLessonId = next.id;
    saveState();
    return next.id;
  }
  return null;
}

function renderToday() {
  const lessonId = pickTodayLesson();
  if (!lessonId) {
    // No more lessons — pick vocab batch
    return renderTodayVocab();
  }
  const lesson = CONTENT.lessons.find(l => l.id === lessonId);
  const done = state.completedLessons.includes(lessonId);

  $view.innerHTML = `
    <div class="card">
      <div class="card-title">${lesson.section} · 今日新学</div>
      <div class="card-heading">${lesson.title}</div>
      <div class="card-sub">${lesson.subtitle}</div>
      <div class="lesson-body">${lesson.body}</div>
      <button class="begin-btn" id="begin-btn">${done ? '再练一遍' : '开始练习 →'}</button>
    </div>
  `;
  document.getElementById('begin-btn').onclick = () => startLessonPractice(lesson);
}

function renderTodayVocab() {
  // Serve a batch of new vocab
  const unseen = CONTENT.vocab.filter(v => !state.items[v.word]);
  if (unseen.length === 0) {
    $view.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🎉</div>
        <div class="empty-title">当前所有内容都在复习循环里了</div>
        <div class="empty-sub">切到"复习"标签继续吧。新内容我们下次再加。</div>
      </div>`;
    return;
  }
  const batch = unseen.slice(0, 5);
  $view.innerHTML = `
    <div class="card">
      <div class="card-title">词汇 · 今日新学</div>
      <div class="card-heading">5 个 7.0+ 高频词</div>
      <div class="card-sub">每个词配一个场景锚点。看完点"开始"进入卡片流。</div>
      <button class="begin-btn" id="begin-vocab-btn">开始学习 →</button>
    </div>
  `;
  document.getElementById('begin-vocab-btn').onclick = () => {
    sessionState = { mode: 'new-vocab', index: 0, list: batch.map(v => v.word) };
    renderVocabCard();
  };
}

function startLessonPractice(lesson) {
  sessionState = {
    mode: 'lesson',
    lessonId: lesson.id,
    index: 0,
    list: lesson.questions,
    correct: 0
  };
  renderQuestionCard();
}

function renderQuestionCard() {
  const q = sessionState.list[sessionState.index];
  if (!q) return finishLessonSession();
  const lesson = CONTENT.lessons.find(l => l.id === sessionState.lessonId);
  $view.innerHTML = `
    <div class="card">
      <div class="card-title">${lesson.section} · 第 ${sessionState.index+1} / ${sessionState.list.length} 题</div>
      <div class="q-context">${q.context}</div>
      <div class="q-prompt">${q.prompt}</div>
      <div class="q-options" id="q-options">
        ${q.options.map((o, i) => `<button class="q-opt" data-i="${i}">${o}</button>`).join('')}
      </div>
      <div id="feedback-slot"></div>
    </div>
  `;
  document.querySelectorAll('.q-opt').forEach(btn => {
    btn.onclick = () => handleAnswer(parseInt(btn.dataset.i), q);
  });
}

function handleAnswer(chosen, q) {
  const buttons = document.querySelectorAll('.q-opt');
  const correct = chosen === q.answer;
  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add('correct');
    else if (i === chosen && !correct) b.classList.add('wrong');
  });
  if (correct) sessionState.correct += 1;

  // SRS entry for this question
  const itemId = 'q:' + sessionState.lessonId + ':' + sessionState.index;
  scheduleItem(itemId, correct ? 2 : 0);

  gainXP(XP_PER_ITEM + (correct ? 5 : 0));

  const fb = document.getElementById('feedback-slot');
  fb.innerHTML = `
    <div class="feedback ${correct ? 'correct' : 'wrong'}">
      <div class="feedback-label">${correct ? '✓ 抓住了' : '✗ 差一点'}</div>
      <div>${correct ? '选对了。看看这题为什么是这个答案：' : '正确答案是 <strong>' + q.options[q.answer] + '</strong>。'}</div>
      <div class="insight">💡 ${q.insight}</div>
      <button class="begin-btn" style="margin-top:14px" id="next-q">${sessionState.index+1 >= sessionState.list.length ? '完成本课 →' : '下一题 →'}</button>
    </div>
  `;
  document.getElementById('next-q').onclick = () => {
    sessionState.index += 1;
    renderQuestionCard();
  };
}

function finishLessonSession() {
  const lesson = CONTENT.lessons.find(l => l.id === sessionState.lessonId);
  if (!state.completedLessons.includes(lesson.id)) {
    state.completedLessons.push(lesson.id);
  }
  state.todayLessonId = null; // allow next lesson tomorrow
  saveState();
  const pct = Math.round(100 * sessionState.correct / sessionState.list.length);
  $view.innerHTML = `
    <div class="card" style="text-align:center; padding:40px 24px;">
      <div style="font-size:48px; margin-bottom:8px;">${pct >= 80 ? '🎯' : pct >= 60 ? '💪' : '📚'}</div>
      <div style="font-size:22px; font-weight:700; margin-bottom:6px;">本课完成</div>
      <div style="color:var(--text-dim); margin-bottom:20px;">正确率 ${sessionState.correct} / ${sessionState.list.length}（${pct}%）· 已进入间隔复习循环</div>
      <button class="begin-btn" onclick="switchView('today')">继续下一项 →</button>
    </div>
  `;
}

        <button class="begin-btn" id="reveal-btn">显示释义</button>
        <div id="reveal-slot"></div>
      </div>
    `;
    document.getElementById('reveal-btn').onclick = () => {
      document.getElementById('reveal-btn').style.display = 'none';
      document.getElementById('reveal-slot').innerHTML = `
        <div class="vocab-def" style="margin-top:20px">${v.def}</div>
        <div class="vocab-scene">
          <div class="scene-label">场景锚点</div>
          ${v.scene}
        </div>
        <div class="vocab-example">"${v.ex}"</div>
        <div style="font-size:13px; color:var(--text-dim); margin-top:16px;">刚才自己想出来了吗？</div>
        <div class="rating">
          <button class="r-forgot" data-r="0">完全忘了<span class="interval">明天</span></button>
          <button class="r-hard" data-r="1">记得一点<span class="interval">保持当前间隔</span></button>
          <button class="r-good" data-r="2">直接想出来<span class="interval">拉长间隔</span></button>
        </div>
      `;
      document.querySelectorAll('.rating button').forEach(b => {
        b.onclick = () => {
          scheduleItem(v.word, parseInt(b.dataset.r));
          gainXP(XP_PER_ITEM);
          sessionState.index += 1;
          renderReviewCard();
        };
      });
    };
  }
}

/* --- VIEW: LIBRARY --- */
function renderLibrary() {
  const completed = state.completedLessons;
  $view.innerHTML = `
    <div class="card">
      <div class="card-title">技巧库</div>
      <div class="card-heading">已学到的打法</div>
      <div class="card-sub">点开任何一课都可以重看讲解 + 再练一遍。</div>
      ${CONTENT.lessons.map(l => `
        <div class="mastery-item" style="cursor:pointer" data-lesson="${l.id}">
          <div>
            <div class="m-word">${l.title}</div>
            <div style="font-size:12px; color:var(--text-dim); margin-top:2px;">${l.section} · ${l.subtitle}</div>
          </div>
          <div class="mastery-level">${completed.includes(l.id) ? '<span style="color:var(--success)">✓ 已学</span>' : '<span style="color:var(--text-dimmer)">未开始</span>'}</div>
        </div>
      `).join('')}
    </div>
  `;
  document.querySelectorAll('[data-lesson]').forEach(el => {
    el.onclick = () => {
      const lesson = CONTENT.lessons.find(l => l.id === el.dataset.lesson);
      state.todayLessonId = lesson.id;
      saveState();
      switchView('today');
    };
  });
}

/* --- VIEW: PROGRESS --- */
function renderProgress() {
  // Last 14 days
  const days = [];
  const now = new Date(todayStr() + 'T00:00:00');
  for (let i = 13; i >= 0; i--) {
    const d = new Date(now.getTime() - i * DAY_MS);
    const key = d.toISOString().slice(0,10);
    days.push({ key, done: !!state.history[key], today: i === 0 });
  }
  const items = Object.entries(state.items).map(([id, data]) => {
    let label = id;
    if (id.startsWith('q:')) {
      const parts = id.split(':');
      const lesson = CONTENT.lessons.find(l => l.id === parts[1]);
      label = (lesson ? lesson.title : parts[1]) + ' · Q' + (parseInt(parts[2])+1);
    }
    return { id, label, level: data.level, nextDue: data.nextDue };
  }).sort((a,b) => b.level - a.level);

  $view.innerHTML = `
    <div class="card">
      <div class="card-title">连续学习</div>
      <div class="card-heading">${state.streak} 天</div>
      <div class="card-sub">最近 14 天</div>
      <div class="calendar">
        ${days.map(d => `<div class="day ${d.done ? 'done' : ''} ${d.today ? 'today' : ''}" title="${d.key}"></div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-title">掌握程度</div>
      <div class="card-heading">${items.length} 项在循环中</div>
      <div class="card-sub">星级 = SRS 层级，越高间隔越长。</div>
      ${items.length === 0 ? '<div style="color:var(--text-dim); font-size:14px;">还没开始学。去"今日新学"看看。</div>' :
        items.slice(0, 30).map(item => `
          <div class="mastery-item">
            <div class="m-word">${item.label}</div>
            <div class="mastery-level">
              <span class="stars">${'★'.repeat(item.level)}${'☆'.repeat(5-item.level)}</span>
              <span style="margin-left:8px">${item.nextDue}</span>
            </div>
          </div>
        `).join('')}
    </div>
  `;
}

/* =============================================================
   NAV
   ============================================================= */
function switchView(v) {
  currentView = v;
  document.querySelectorAll('.nav button').forEach(b => {
    b.classList.toggle('active', b.dataset.view === v);
  });
  if (v === 'today') renderToday();
  else if (v === 'review') renderReview();
  else if (v === 'library') renderLibrary();
  else if (v === 'progress') renderProgress();
}
document.querySelectorAll('.nav button').forEach(b => {
  b.onclick = () => switchView(b.dataset.view);
});
window.switchView = switchView;

/* =============================================================
   INIT
   ============================================================= */
state = loadState();
updateStreak();
updateStats();
switchView('today');
</script>
</body>
</html>
